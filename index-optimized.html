:root{--rh-red:#EE0000;--rh-red-alt:#CC0000;--rh-red-deep:#8a0000;--ease-expo:cubic-bezier(.165,.84,.44,1);--navy-blue:#304553;--navy-dark:#1a262f}
body{background:#304553;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}body.white{background-color:#fff;background-image:none}

.content-wrapper{position:relative;z-index:1}.section-container{padding:60px 0 40px}.work-experience{margin-bottom:40px}.work-experience:last-of-type{margin-bottom:0}.footer-container{padding:20px 0 30px}.background-color-layer{background-size:cover;opacity:.15;background-repeat:no-repeat;position:absolute;z-index:-1;top:0;width:100%;left:0;right:0;bottom:30%;box-shadow:inset 0 -40px 60px 10px #304553}

html body .card,html body .card[style]{transform:scale(.97);transition:transform .15s var(--ease-expo),box-shadow .15s var(--ease-expo),border-color .15s ease;backface-visibility:hidden;will-change:transform;position:relative;border:1px solid #eee}
html body .card:hover{transform:translateY(-8px) scale(1.03);box-shadow:0 15px 40px rgba(0,0,0,.4),0 5px 10px rgba(0,0,0,.2);border-color:var(--navy-blue);z-index:9999}
html body .card:active{transform:translateY(-2px) scale(1);transition:.1s}
/* BUTTONS - GPU Optimized */
.btn-primary,#enviar-mensaje,button[type="submit"]{background:var(--navy-blue);border:none;color:#fff;border-radius:4px;padding:12px 24px;text-transform:uppercase;font-weight:bold;letter-spacing:1px;transition:transform .1s ease,opacity .1s ease;will-change:transform,opacity}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:active{transform:scale(.96)}
.form-control{background-color:#f9f9f9;border:1px solid #ddd;border-radius:2px;color:#333}.form-control:focus{border-color:var(--navy-blue);background-color:#fff}
/* TABLE HOVER - GPU Optimized */
.table>tbody>tr{transition:background-color .15s ease;will-change:background-color}
.table>tbody>tr:hover>td{background-color:#fff5f5}
.table>tbody>tr:hover>td:first-child{border-left:3px solid var(--rh-red)}
/* ICONS - GPU Optimized */
.social-round-icon{transition:transform .15s var(--ease-expo),background-color .15s ease,color .15s ease;will-change:transform}
.social-round-icon:hover{transform:rotate(360deg);background-color:var(--rh-red);color:#fff}
footer,.social-buttons a{color:var(--navy-blue)}
/* SCROLLBAR */
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:#f1f1f1}::-webkit-scrollbar-thumb{background:#333}::-webkit-scrollbar-thumb:hover{background:var(--rh-red)}
::selection{background:var(--rh-red);color:#fff}
/* NAV - INSTANT ANIMATION (0.15s) */
.navbar-nav>li>a{position:relative;padding-bottom:4px}
.navbar-nav>li>a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--rh-red);transition:width .15s var(--ease-expo);will-change:width}
.navbar-nav>li>a:hover::after,.navbar-nav>li.active>a::after{width:100%}
.h5,h5{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-weight:700}.h5.date-title,h5.date-title{margin-top:3px;margin-bottom:20px}.h5 a,h5 a{color:#000}.h5 a:hover,h5 a:hover{color:#304553;text-decoration:none}.h5 small,h5 small{font-size:1em}
